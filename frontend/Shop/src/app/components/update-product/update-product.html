<div class="container mt-4">
  <div class="card shadow-lg p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Update Product</h4>
      <button class="btn btn-outline-secondary back-btn" routerLink="">← Back</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <!-- Name -->
      <div class="mb-3">
        <label>Name</label>
        <input
          class="form-control"
          formControlName="name"
          [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
        />

        <div class="invalid-feedback">Name is required</div>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label>Description</label>
        <textarea
          class="form-control"
          formControlName="description"
          [class.is-invalid]="form.get('description')?.invalid && form.get('description')?.touched"
        ></textarea>

        <div class="invalid-feedback">Description is required</div>
      </div>

      <!-- Prices -->
      <div class="row">
        <div class="col">
          <label>Old Price</label>
          <input
            type="number"
            class="form-control"
            formControlName="oldPrice"
            [class.is-invalid]="form.get('oldPrice')?.invalid && form.get('oldPrice')?.touched"
          />

          <div class="invalid-feedback">Old price is required</div>
        </div>

        <div class="col">
          <label>New Price</label>
          <input
            type="number"
            class="form-control"
            formControlName="newPrice"
            [class.is-invalid]="form.get('newPrice')?.invalid && form.get('newPrice')?.touched"
          />

          <div class="invalid-feedback">New price is required</div>
        </div>
      </div>

      <!-- Image -->
      <div class="mb-3 mt-3">
        <label>Image</label>
        <input type="file" class="form-control" (change)="onFileChange($event)" />

        @if (form.get('image')?.invalid && onFileChangeEventClicked) {
          <div class="text-danger">Image is required</div>
        }
      </div>
      <!-- IMAGE PREVIEW -->
      @if (imagePreview) {
        <div class="mt-3 mb-3 text-center">
          <img [src]="imagePreview" class="img-thumbnail shadow imageSize" />
        </div>
      } @else {
        <div class="mt-3 mb-3 text-center">
          <img [src]="product().imagePath" class="img-thumbnail shadow imageSize" />
        </div>
      }
      <!-- Submit -->
      <button class="btn btn-primary w-100" type="submit" [disabled]="form.invalid">
        Update Product
      </button>
    </form>
  </div>
</div>
